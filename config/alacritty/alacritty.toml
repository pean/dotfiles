[general]
import = ["./nord.toml"]
live_config_reload = true

[window]
decorations = "None"

[window.padding]
x = 0
y = 0

[font]
size = 12.5
# 25% cell height adjustment (equivalent to Ghostty's adjust-cell-height = 25%)
builtin_box_drawing = true
# line_height = 1.25

[font.normal]
family = "Monaspace Krypton NF"
style = "Light"  # weight=200 equivalent

[font.bold]
family = "Monaspace Krypton NF"
style = "Bold"

[font.italic]
family = "Monaspace Krypton NF"
style = "Light Italic"

[font.bold_italic]
family = "Monaspace Krypton NF"
style = "Bold Italic"

[font.offset]
x = 0
y = 8

[font.glyph_offset]
x = 0
y = 0

# Note: Alacritty has limited OpenType feature control compared to Ghostty.
# The following font features from Ghostty cannot be directly ported:
# - calt, liga (contextual alternates and ligatures)
# - Stylistic sets: ss07, ss08, -ss01 through -ss06, -ss09
# - Character variants: cv01=3, -cv02, +cv31
# These features may be enabled by default depending on the font configuration.


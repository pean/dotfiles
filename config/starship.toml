format = """$username$hostname${custom.git_repo}${custom.worktree}$directory$git_branch$git_commit$git_state$git_metrics$git_status$aws$direnv$env_var$mise$sudo$line_break$jobs$battery$status$os$container$shell$character"""

# right_format = """$cmd_duration $time"""

[time]
disabled = true
format = "[$time]($style)"
time_format = "%-m-%-d%k%M"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
ignore_bare_repo = true

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "◆"
ahead = "▲"
behind = "▼"
diverged = "◀"
up_to_date = "✓"
untracked = "○"
stashed = "" # ●
modified = "◌"
staged = "◉"
renamed = "▷"
deleted = "◍"

[git_metrics]
disabled = false
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true
ignore_submodules = false

[directory]
truncate_to_repo = true
truncation_length = 4
style = "cyan"
# Show only the subpath within the repo (repo name shown by custom.git_repo).
# Outside git repos, falls back to normal directory display.
repo_root_format = "([$path$read_only]($style) )"
repo_root_style = "cyan"
before_repo_root_style = "dimmed cyan"
format = "[$path]($style)[$read_only]($read_only_style) "

[custom.git_repo]
description = "Show git repo name instead of directory path"
command = '''
  common=$(git rev-parse --git-common-dir 2>/dev/null) || exit 1
  case "$common" in
    /*) name=$(basename "$common" .git) ;;
    *)  name=$(basename "$(git rev-parse --show-toplevel 2>/dev/null)") ;;
  esac
  printf "%s" "$name"
'''
when = "git rev-parse --git-dir > /dev/null 2>&1"
format = "([$output]($style) )"
style = "bold blue"
shell = ["sh"]

[custom.worktree]
description = "Show indicator when inside a git worktree"
command = '''
  git_dir=$(git rev-parse --absolute-git-dir 2>/dev/null) || exit 1
  common=$(git rev-parse --git-common-dir 2>/dev/null) || exit 1
  case "$common" in
    /*) ;;
    *) common="$(cd "$common" 2>/dev/null && pwd)" ;;
  esac
  [ "$git_dir" != "$common" ] && printf "" || exit 1
'''
when = "git rev-parse --git-dir > /dev/null 2>&1"
format = "([$output]($style) )"
style = "yellow"
shell = ["sh"]

[cmd_duration]
format = "[$duration]($style)"
min_time = 0
show_milliseconds = true
show_notifications = false

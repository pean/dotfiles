format = """$username$hostname$shlvl$singularity$kubernetes${custom.git_repo}${custom.worktree}$directory$vcsh$git_branch$git_commit$git_state$git_metrics$git_status$memory_usage$aws$gcloud$openstack$azure$nats$direnv$env_var$mise$sudo$line_break$jobs$battery$status$os$container$netns$shell$character"""

# right_format = """$cmd_duration $time"""

[time]
disabled = true
format = "[$time]($style)"
time_format = "%-m-%-d%k%M"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "

# [git_status]
# stashed = ""
# format = '([$all_status $ahead_behind]($style))'

# [git_metrics]
# disabled = true

[directory]
truncate_to_repo = true
truncation_length = 4
style = "cyan"
# Show only the subpath within the repo (repo name shown by custom.git_repo).
# Outside git repos, falls back to normal directory display.
repo_root_format = "([$path$read_only]($style) )"
repo_root_style = "cyan"
before_repo_root_style = "dimmed cyan"
format = "[$path]($style)[$read_only]($read_only_style) "

[custom.git_repo]
description = "Show git repo name instead of directory path"
command = '''
  common=$(git rev-parse --git-common-dir 2>/dev/null) || exit 1
  case "$common" in
    /*) name=$(basename "$common" .git) ;;
    *)  name=$(basename "$(git rev-parse --show-toplevel 2>/dev/null)") ;;
  esac
  printf "%s" "$name"
'''
when = "git rev-parse --git-dir > /dev/null 2>&1"
format = "([$output]($style) )"
style = "bold blue"
shell = ["sh"]

[custom.worktree]
description = "Show indicator when inside a git worktree"
command = '''
  git_dir=$(git rev-parse --absolute-git-dir 2>/dev/null) || exit 1
  common=$(git rev-parse --git-common-dir 2>/dev/null) || exit 1
  case "$common" in
    /*) ;;
    *) common="$(cd "$common" 2>/dev/null && pwd)" ;;
  esac
  [ "$git_dir" != "$common" ] && printf "" || exit 1
'''
when = "git rev-parse --git-dir > /dev/null 2>&1"
format = "([$output]($style) )"
style = "yellow"
shell = ["sh"]

# [aws]

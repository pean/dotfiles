# Catppuccin Latte for tmux (generated from theme-palette.conf)

set -g pane-border-style "fg=#ccd0da"
set -g pane-active-border-style "fg=#7287fd"

set -g window-status-format "#[fg=#8c8fa1,bg=#ccd0da] #I #[fg=#4c4f69,bg=#ccd0da] #W "
set -g window-status-current-format "#[fg=#eff1f5,bg=#8839ef] #I #[fg=#4c4f69,bg=#eff1f5] #W "
set -g window-status-separator ""
set -g window-status-activity-style "bg=#df8e1d,fg=#eff1f5"
set -g window-status-bell-style "bg=#df8e1d,fg=#eff1f5"

set -g status-style "bg=#ccd0da,fg=#4c4f69"
set -g status-left ""
set -g status-right '#[fg=#8839ef,bg=#ccd0da]#(~/.dotfiles/scripts/tmux-git-worktree.sh #{pane_current_path}) #[fg=#4c4f69,bg=#ccd0da]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#40a02b,bg=#ccd0da]+#(cd #{pane_current_path}; git diff --numstat 2>/dev/null | awk "{add+=\$1; del+=\$2} END {print add}") #[fg=#d20f39,bg=#ccd0da]-#(cd #{pane_current_path}; git diff --numstat 2>/dev/null | awk "{add+=\$1; del+=\$2} END {print del}") #[fg=#eff1f5,bg=#8839ef] #S '
set -g status-right-length 100

set -g @tmux-fzf-options '-p -w 62% -h 38% --color=bg+:#bcc0cc,bg:#eff1f5,spinner:#8839ef,hl:#7287fd,fg:#4c4f69,header:#7287fd,info:#8839ef,pointer:#8839ef,marker:#8839ef,fg+:#4c4f69,prompt:#8839ef,hl+:#7287fd --bind=ctrl-x:execute-silent(echo {} | sed "s/:.*$//" | xargs tmux kill-session -t)+reload(tmux list-sessions)'

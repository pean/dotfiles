# Catppuccin Frappe for tmux (generated from theme-palette.conf)

set -g pane-border-style "fg=#414559"
set -g pane-active-border-style "fg=#babbf1"

set -g window-status-format "#[fg=#838ba7,bg=#414559] #I #[fg=#c6d0f5,bg=#414559] #W "
set -g window-status-current-format "#[fg=#303446,bg=#ca9ee6] #I #[fg=#c6d0f5,bg=#303446] #W "
set -g window-status-separator ""
set -g window-status-activity-style "bg=#e5c890,fg=#303446"
set -g window-status-bell-style "bg=#e5c890,fg=#303446"

set -g status-style "bg=#414559,fg=#c6d0f5"
set -g status-left ""
set -g status-right '#[fg=#ca9ee6,bg=#414559]#(~/.dotfiles/scripts/tmux-git-worktree.sh #{pane_current_path}) #[fg=#c6d0f5,bg=#414559]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#a6d189,bg=#414559]+#(cd #{pane_current_path}; git diff --numstat 2>/dev/null | awk "{add+=\$1; del+=\$2} END {print add}") #[fg=#e78284,bg=#414559]-#(cd #{pane_current_path}; git diff --numstat 2>/dev/null | awk "{add+=\$1; del+=\$2} END {print del}") #[fg=#303446,bg=#ca9ee6] #S '
set -g status-right-length 100

set -g @tmux-fzf-options '-p -w 62% -h 38% --color=bg+:#51576d,bg:#303446,spinner:#ca9ee6,hl:#babbf1,fg:#c6d0f5,header:#babbf1,info:#ca9ee6,pointer:#ca9ee6,marker:#ca9ee6,fg+:#c6d0f5,prompt:#ca9ee6,hl+:#babbf1 --bind=ctrl-x:execute-silent(echo {} | sed "s/:.*$//" | xargs tmux kill-session -t)+reload(tmux list-sessions)'

# Catppuccin Mocha for tmux (generated from theme-palette.conf)

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#b4befe"

set -g window-status-format "#[fg=#7f849c,bg=#313244] #I #[fg=#cdd6f4,bg=#313244] #W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7] #I #[fg=#cdd6f4,bg=#1e1e2e] #W "
set -g window-status-separator ""
set -g window-status-activity-style "bg=#f9e2af,fg=#1e1e2e"
set -g window-status-bell-style "bg=#f9e2af,fg=#1e1e2e"

set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left ""
set -g status-right '#[fg=#cba6f7,bg=#313244]#(~/.dotfiles/scripts/tmux-git-worktree.sh #{pane_current_path}) #[fg=#cdd6f4,bg=#313244]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#a6e3a1,bg=#313244]+#(cd #{pane_current_path}; git diff --numstat 2>/dev/null | awk "{add+=\$1; del+=\$2} END {print add}") #[fg=#f38ba8,bg=#313244]-#(cd #{pane_current_path}; git diff --numstat 2>/dev/null | awk "{add+=\$1; del+=\$2} END {print del}") #[fg=#1e1e2e,bg=#cba6f7] #S '
set -g status-right-length 100

set -g @tmux-fzf-options '-p -w 62% -h 38% --color=bg+:#45475a,bg:#1e1e2e,spinner:#cba6f7,hl:#b4befe,fg:#cdd6f4,header:#b4befe,info:#cba6f7,pointer:#cba6f7,marker:#cba6f7,fg+:#cdd6f4,prompt:#cba6f7,hl+:#b4befe --bind=ctrl-x:execute-silent(echo {} | sed "s/:.*$//" | xargs tmux kill-session -t)+reload(tmux list-sessions)'

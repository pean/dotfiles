# Catppuccin Macchiato for tmux (generated from theme-palette.conf)

set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#b7bdf8"

set -g window-status-format "#[fg=#8087a2,bg=#363a4f] #I #[fg=#cad3f5,bg=#363a4f] #W "
set -g window-status-current-format "#[fg=#24273a,bg=#c6a0f6] #I #[fg=#cad3f5,bg=#24273a] #W "
set -g window-status-separator ""
set -g window-status-activity-style "bg=#eed49f,fg=#24273a"
set -g window-status-bell-style "bg=#eed49f,fg=#24273a"

set -g status-style "bg=#363a4f,fg=#cad3f5"
set -g status-left ""
set -g status-right '#[fg=#c6a0f6,bg=#363a4f]#(~/.dotfiles/scripts/tmux-git-worktree.sh #{pane_current_path}) #[fg=#cad3f5,bg=#363a4f]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#a6da95,bg=#363a4f]+#(cd #{pane_current_path}; git diff --numstat 2>/dev/null | awk "{add+=\$1; del+=\$2} END {print add}") #[fg=#ed8796,bg=#363a4f]-#(cd #{pane_current_path}; git diff --numstat 2>/dev/null | awk "{add+=\$1; del+=\$2} END {print del}") #[fg=#24273a,bg=#c6a0f6] #S '
set -g status-right-length 100

set -g @tmux-fzf-options '-p -w 62% -h 38% --color=bg+:#494d64,bg:#24273a,spinner:#c6a0f6,hl:#b7bdf8,fg:#cad3f5,header:#b7bdf8,info:#c6a0f6,pointer:#c6a0f6,marker:#c6a0f6,fg+:#cad3f5,prompt:#c6a0f6,hl+:#b7bdf8 --bind=ctrl-x:execute-silent(echo {} | sed "s/:.*$//" | xargs tmux kill-session -t)+reload(tmux list-sessions)'
